<!DOCTYPE html>
<html lang="zh-RU">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#3498db">
    
    <title>车辆信息报告 | Авто отчёт</title>
    <!-- jsPDF для работы с изображениями -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, 
                         "Microsoft YaHei", "PingFang SC", sans-serif; 
            padding: 15px; background: #f5f5f5; color: #333; line-height: 1.5; margin: 0;
        }
        .container { max-width: 650px; margin: 0 auto; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.08); }
        h2 { text-align: center; color: #2c3e50; margin: 0 0 25px 0; font-size: 20px; }
        h2 small { display: block; font-size: 13px; color: #7f8c8d; font-weight: normal; margin-top: 6px; }
        
        .form-group { margin-bottom: 16px; }
        label { display: block; margin-bottom: 6px; font-weight: 600; font-size: 14px; color: #2c3e50; }
        .label-cn { color: #2c3e50; }
        .label-ru { color: #7f8c8d; font-weight: normal; font-size: 13px; margin-left: 6px; }
        .required { color: #e74c3c; margin-left: 3px; }
        
        input, textarea, select { 
            width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 6px; 
            font-size: 16px; transition: border-color 0.2s; background: #fff;
        }
        input:focus, textarea:focus, select:focus { border-color: #3498db; outline: none; background: #fdfeff; }
        textarea { resize: vertical; min-height: 80px; }
        
        .row { display: flex; gap: 12px; }
        .row .form-group { flex: 1; }
        
        #image-preview { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 10px; min-height: 40px; background: #fafafa; padding: 8px; border-radius: 6px; border: 1px dashed #ddd; }
        .preview-img { width: 80px; height: 80px; object-fit: cover; border: 2px solid #fff; border-radius: 6px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        
        .file-input-wrapper { position: relative; overflow: hidden; display: inline-block; width: 100%; }
        .file-input-btn {
            display: block; width: 100%; padding: 12px; background: #ecf0f1; color: #2c3e50; 
            text-align: center; border-radius: 6px; font-weight: 600; cursor: pointer; border: 2px dashed #bdc3c7;
        }
        .file-input-btn:hover { background: #e0e6e7; }
        #photos { 
            position: absolute; left: 0; top: 0; opacity: 0; width: 100%; height: 100%; cursor: pointer; 
        }
        
        button { 
            width: 100%; padding: 15px; background: #3498db; color: white; border: none; 
            border-radius: 8px; font-size: 17px; font-weight: 600; cursor: pointer; 
            transition: background 0.2s; margin-top: 15px; -webkit-appearance: none;
        }
        button:hover { background: #2980b9; }
        button:active { transform: scale(0.98); }
        button:disabled { background: #95a5a6; cursor: not-allowed; transform: none; }
        
        #loading { 
            display: none; text-align: center; padding: 15px; color: #2c3e50; 
            background: #e8f4fd; border-radius: 8px; margin-top: 15px; font-weight: 500;
        }
        .hint { font-size: 12px; color: #7f8c8d; margin-top: 5px; line-height: 1.4; }
        .error-msg { color: #e74c3c; font-size: 13px; margin-top: 8px; background: #fdedec; padding: 8px; border-radius: 4px; display: none; }
        .progress-text { font-size: 13px; color: #27ae60; font-weight: 600; margin-top: 8px; text-align: center; }
        .debug-info { font-size: 11px; color: #95a5a6; margin-top: 5px; text-align: center; white-space: pre-line; }
        
        @media (max-width: 500px) {
            .row { flex-direction: column; gap: 0; }
            body { padding: 10px; }
        }
    </style>
</head>
<body>

<div class="container">
    <h2>
        🚗 车辆信息登记表
        <small>Форма для заполнения данных об автомобиле</small>
    </h2>
    
    <div class="form-group">
        <label>
            <span class="label-cn">品牌/型号</span>
            <span class="label-ru">| Марка / Модель</span>
            <span class="required">*</span>
        </label>
        <input type="text" id="model" placeholder="例如：Toyota Camry 2.5G" autocomplete="off">
    </div>

    <div class="row">
        <div class="form-group">
            <label>
                <span class="label-cn">上牌年份</span>
                <span class="label-ru">| Год выпуска</span>
                <span class="required">*</span>
            </label>
            <input type="number" id="year" placeholder="2020" min="1990" max="2026" inputmode="numeric">
        </div>
        <div class="form-group">
            <label>
                <span class="label-cn">马力</span>
                <span class="label-ru">| Лошадиные силы</span>
                <span class="required">*</span>
            </label>
            <input type="number" id="horsepower" placeholder="例如：203" inputmode="numeric">
        </div>
    </div>

    <div class="row">
        <div class="form-group">
            <label>
                <span class="label-cn">里程</span>
                <span class="label-ru">| Пробег (км)</span>
                <span class="required">*</span>
            </label>
            <input type="number" id="mileage" placeholder="例如：45000" inputmode="numeric">
        </div>
        <div class="form-group">
            <label>
                <span class="label-cn">价格</span>
                <span class="label-ru">| Цена (CNY)</span>
                <span class="required">*</span>
            </label>
            <input type="number" id="price" placeholder="例如：125000" inputmode="numeric">
        </div>
    </div>

    <div class="form-group">
        <label>
            <span class="label-cn">配置 / 车辆描述</span>
            <span class="label-ru">| Комплектация / Описание</span>
        </label>
        <textarea id="desc" placeholder="例如：全景天窗，真皮座椅，360 影像，无事故..."></textarea>
        <div class="hint">💡 请详细描述配置、车况 | Опишите комплектацию и состояние</div>
    </div>

    <div class="form-group">
        <label>
            <span class="label-cn">车辆照片</span>
            <span class="label-ru">| Фото автомобиля</span>
            <span class="required">*</span>
        </label>
        
        <div class="file-input-wrapper">
            <div class="file-input-btn">📷 选择照片 | Выбрать фото</div>
            <input type="file" id="photos" multiple accept="image/*" onchange="handleFiles(this.files)">
        </div>
        
        <div class="hint">📸 建议 3-5 张 | Рекомендуем 3-5 фото<br>⚠️ iPhone: Настройки > Камера > Форматы > «Совместимые»</div>
        
        <div id="image-preview"></div>
        <div id="progress-text" class="progress-text"></div>
        <div id="debug-info" class="debug-info"></div>
        <div id="error-box" class="error-msg"></div>
    </div>

    <div class="form-group">
        <label>
            <span class="label-cn">您的联系方式</span>
            <span class="label-ru">| Ваш контакт (WeChat/тел.)</span>
            <span class="required">*</span>
        </label>
        <input type="text" id="contact" placeholder="微信 / 电话" autocomplete="off">
    </div>

    <button onclick="generatePDF()" id="btn-generate">📄 生成 PDF 报告 | Скачать отчёт</button>
    <div id="loading">⏳ 生成中... | Идёт генерация, подождите...</div>
</div>

<script>
    let uploadedImages = [];

    // === 1. ОБРАБОТКА ФАЙЛОВ ===
    async function handleFiles(files) {
        const preview = document.getElementById('image-preview');
        const progressText = document.getElementById('progress-text');
        const debugInfo = document.getElementById('debug-info');
        const errorBox = document.getElementById('error-box');
        
        errorBox.style.display = 'none';
        errorBox.textContent = '';
        uploadedImages = [];
        
        if (!files || files.length === 0) {
            preview.innerHTML = '<div style="color:#999;font-size:13px;padding:10px;">Фото не выбраны</div>';
            return;
        }
        
        if (files.length > 5) {
            showError('⚠️ 最多 5 张照片 | Максимум 5 фото');
            document.getElementById('photos').value = '';
            return;
        }
        
        preview.innerHTML = '';
        progressText.textContent = `🔄 Обработка 0/${files.length}...`;
        debugInfo.textContent = '';
        
        for (let i = 0; i < files.length; i++) {
            const file = files[i];
            progressText.textContent = `🔄 Обработка ${i+1}/${files.length}...`;
            
            if (!file.type.startsWith('image/')) {
                showError(`❌ Файл ${file.name} не является изображением`);
                continue;
            }
            
            try {
                const base64 = await compressAndReadFile(file, 800, 0.75);
                uploadedImages.push(base64);
                
                const img = document.createElement('img');
                img.src = base64;
                img.className = 'preview-img';
                preview.appendChild(img);
                
                debugInfo.textContent += `✓ Фото ${i+1}: ${(base64.length * 0.75 / 1024).toFixed(0)} КБ\n`;
                
            } catch (err) {
                console.error('Ошибка:', err);
                showError(`❌ Ошибка фото ${i+1}: ${err.message}`);
            }
        }
        
        const totalSize = uploadedImages.reduce((acc, img) => acc + (img.length * 0.75), 0);
        progressText.textContent = `✅ Загружено: ${uploadedImages.length} фото`;
        debugInfo.textContent += `\n📦 Всего: ${(totalSize/1024/1024).toFixed(2)} МБ`;
    }

    // Сжатие
    function compressAndReadFile(file, maxSize = 800, quality = 0.75) {
        return new Promise((resolve, reject) => {
            const reader = new FileReader();
            reader.onload = (e) => {
                const img = new Image();
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    const ctx = canvas.getContext('2d');
                    
                    let width = img.width;
                    let height = img.height;
                    
                    if (width > height) {
                        if (width > maxSize) {
                            height = Math.round((height * maxSize) / width);
                            width = maxSize;
                        }
                    } else {
                        if (height > maxSize) {
                            width = Math.round((width * maxSize) / height);
                            height = maxSize;
                        }
                    }
                    
                    canvas.width = width;
                    canvas.height = height;
                    ctx.fillStyle = '#ffffff';
                    ctx.fillRect(0, 0, width, height);
                    ctx.drawImage(img, 0, 0, width, height);
                    
                    resolve(canvas.toDataURL('image/jpeg', quality));
                };
                img.onerror = () => reject(new Error('Не удалось обработать'));
                img.src = e.target.result;
            };
            reader.onerror = () => reject(new Error('Не удалось прочитать'));
            reader.readAsDataURL(file);
        });
    }

    function showError(msg) {
        const errorBox = document.getElementById('error-box');
        errorBox.textContent = msg;
        errorBox.style.display = 'block';
    }

    // === 2. ГЕНЕРАЦИЯ PDF (jsPDF + прямое добавление фото) ===
    async function generatePDF() {
        const required = [
            {id: 'model', label: '品牌/型号 | Марка'},
            {id: 'year', label: '年份 | Год'},
            {id: 'horsepower', label: '马力 | Л.с.'},
            {id: 'mileage', label: '里程 | Пробег'},
            {id: 'price', label: '价格 | Цена'},
            {id: 'contact', label: '联系方式 | Контакт'}
        ];
        for (let f of required) {
            if (!document.getElementById(f.id).value.trim()) {
                alert('⚠️ Заполните: ' + f.label);
                document.getElementById(f.id).focus();
                return;
            }
        }
        
        if (uploadedImages.length < 3) {
            alert('⚠️ 请上传至少 3 张照片 | Минимум 3 фото');
            return;
        }

        const loading = document.getElementById('loading');
        const btn = document.getElementById('btn-generate');
        const debugInfo = document.getElementById('debug-info');
        
        btn.disabled = true;
        loading.style.display = 'block';
        loading.textContent = '📄 Создание PDF...';
        
        try {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF('p', 'mm', 'a4');
            
            const pageWidth = doc.internal.pageSize.getWidth();
            const pageHeight = doc.internal.pageSize.getHeight();
            const margin = 15;
            const contentWidth = pageWidth - (margin * 2);
            
            let y = margin;
            
            // Заголовок
            doc.setFontSize(16);
            doc.setTextColor(44, 62, 80);
            doc.text('车辆信息报告 | Отчёт по автомобилю', pageWidth / 2, y, { align: 'center' });
            y += 8;
            
            // Модель
            doc.setFontSize(14);
            doc.text(document.getElementById('model').value, pageWidth / 2, y, { align: 'center' });
            y += 10;
            
            // Дата и ID
            const now = new Date();
            doc.setFontSize(9);
            doc.setTextColor(127, 140, 141);
            doc.text(`📅 ${now.toLocaleDateString('ru-RU')} | 🔢 TDV-${now.getTime().toString(36).toUpperCase()}`, pageWidth / 2, y, { align: 'center' });
            y += 12;
            
            // Линия
            doc.setDrawColor(44, 62, 80);
            doc.setLineWidth(0.5);
            doc.line(margin, y, pageWidth - margin, y);
            y += 10;
            
            // Таблица данных
            doc.setFontSize(10);
            doc.setTextColor(44, 62, 80);
            
            const data = [
                ['年份 | Год', document.getElementById('year').value],
                ['马力 | Л.с.', document.getElementById('horsepower').value + ' HP'],
                ['里程 | Пробег', document.getElementById('mileage').value + ' км'],
                ['价格 | Цена', document.getElementById('price').value + ' ¥'],
                ['联系方式 | Контакт', document.getElementById('contact').value]
            ];
            
            const rowHeight = 8;
            data.forEach(row => {
                doc.text(row[0], margin, y);
                doc.text(row[1], pageWidth - margin, y, { align: 'right' });
                y += rowHeight;
            });
            
            y += 5;
            
            // Описание
            doc.setFontSize(11);
            doc.text('配置描述 | Описание:', margin, y);
            y += 7;
            
            const desc = document.getElementById('desc').value || '—';
            const descLines = doc.splitTextToSize(desc, contentWidth);
            descLines.forEach(line => {
                if (y > pageHeight - 20) {
                    doc.addPage();
                    y = margin;
                }
                doc.text(line, margin, y);
                y += 5;
            });
            
            y += 10;
            
            // === ФОТО (прямое добавление в PDF) ===
            doc.setFontSize(11);
            doc.text('车辆照片 | Фото автомобиля:', margin, y);
            y += 10;
            
            const photoWidth = (contentWidth - 10) / 3; // 3 фото в ряд
            const photoHeight = photoWidth * 0.75;
            let photoX = margin;
            let photoY = y;
            
            debugInfo.textContent += `\n📷 Добавление ${uploadedImages.length} фото...`;
            
            for (let i = 0; i < uploadedImages.length; i++) {
                if (photoY + photoHeight > pageHeight - 20) {
                    doc.addPage();
                    photoY = margin;
                    photoX = margin;
                }
                
                try {
                    // Прямо добавляем base64 в PDF
                    doc.addImage(uploadedImages[i], 'JPEG', photoX, photoY, photoWidth, photoHeight);
                    debugInfo.textContent += ` ✓`;
                } catch (err) {
                    console.error('Ошибка добавления фото:', err);
                    debugInfo.textContent += ` ✗`;
                }
                
                photoX += photoWidth + 5;
                if (photoX + photoWidth > pageWidth - margin) {
                    photoX = margin;
                    photoY += photoHeight + 5;
                }
            }
            
            y = photoY + photoHeight + 15;
            
            // Футер
            if (y > pageHeight - 20) {
                doc.addPage();
                y = margin;
            }
            
            doc.setFontSize(8);
            doc.setTextColor(149, 165, 166);
            doc.text('报告由 «Турбо ДВ» 系统自动生成', pageWidth / 2, y, { align: 'center' });
            y += 4;
            doc.text('Отчёт сгенерирован автоматически | 🇷🇺 Россия · Дальний Восток', pageWidth / 2, y, { align: 'center' });
            
            // Сохранение
            const filename = 'car_report_' + document.getElementById('model').value.trim().substring(0,10) + '.pdf';
            doc.save(filename);
            
            loading.style.display = 'none';
            btn.disabled = false;
            btn.innerText = '📄 生成 PDF 报告 | Скачать отчёт';
            debugInfo.textContent += '\n✅ PDF создан!';
            alert('✅ PDF готов!\nФото добавлены.\nОтправьте нам!');
            
        } catch (err) {
            console.error('PDF Error:', err);
            loading.style.display = 'none';
            btn.disabled = false;
            btn.innerText = '📄 生成 PDF 报告 | Скачать отчёт';
            debugInfo.textContent += '\n❌ ' + err.message;
            alert('❌ Ошибка: ' + err.message);
        }
    }
</script>

</body>
</html>
